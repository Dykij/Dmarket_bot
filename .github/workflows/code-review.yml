name: Deep Code Review (MiMo V2.5 Pro)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty to auto-detect from branch)"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Priority 1: workflow_dispatch input
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            echo "PR number from input: $PR_NUM"
          # Priority 2: pull_request event
          elif [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "PR number from event: $PR_NUM"
          # Priority 3: find open PR for current branch
          else
            BRANCH="${{ github.ref_name }}"
            echo "Looking for open PR on branch: $BRANCH"
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
              --head "$BRANCH" --state open --json number \
              --jq '.[0].number // empty' 2>&1) || {
              echo "::warning::Failed to detect PR: $PR_NUM"
              echo "found=false" >> $GITHUB_OUTPUT
              exit 0
            }
            if [ -z "$PR_NUM" ]; then
              echo "::warning::No open PR found for branch $BRANCH. Skipping comment."
              echo "found=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "PR number from branch lookup: $PR_NUM"
          fi
          # Validate PR number is a positive integer
          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]] || [ "$PR_NUM" -le 0 ]; then
            echo "::warning::Invalid PR number: $PR_NUM"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Setup Python
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip > /dev/null 2>&1
          pip3 install openai --quiet

      - name: Get diff and files
        id: context
        run: |
          # Get changed files
          FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          echo "files=$FILES" >> $GITHUB_OUTPUT

          # Save diff to file (avoids single-quote escaping issues)
          git diff origin/main...HEAD > /tmp/review_diff.txt

          # Validate diff file
          if [ ! -s /tmp/review_diff.txt ]; then
            echo "::error::Failed to generate diff or diff is empty"
            exit 1
          fi
          echo "diff_file=/tmp/review_diff.txt" >> $GITHUB_OUTPUT

          # Save stats
          STATS=$(git diff --stat origin/main...HEAD)
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create results directory
        run: mkdir -p results

      - name: Run Agent 1 - Correctness
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent correctness \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/correctness.json

      - name: Run Agent 2 - Security
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent security \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/security.json

      - name: Run Agent 3 - Performance
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent performance \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/performance.json

      - name: Run Agent 4 - Architecture
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent architecture \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/architecture.json

      - name: Run Agent 5 - Domain
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent domain \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/domain.json

      - name: Run Agent 6 - Test Coverage
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent test_coverage \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/test_coverage.json

      - name: Run Agent 7 - Async Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent async_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/async_safety.json

      - name: Run Agent 8 - DB Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent db_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/db_safety.json

      - name: Run Agent 9 - API Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent api_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/api_safety.json

      - name: Run Agent 10 - Config Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent config_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/config_safety.json

      - name: Run Agent 11 - Error Recovery
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent error_recovery \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/error_recovery.json

      - name: Run Agent 12 - Duplication
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent duplication \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/duplication.json

      - name: Deduplication
        run: |
          python3 .opencode/agents/dedup.py \
            --input results/correctness.json results/security.json results/performance.json results/architecture.json results/domain.json results/test_coverage.json results/async_safety.json results/db_safety.json results/api_safety.json results/config_safety.json results/error_recovery.json results/duplication.json \
            --output results/deduped.json

      - name: Verification
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/verify.py \
            --input results/deduped.json \
            --output results/verified.json \
            --diff-file "${{ steps.context.outputs.diff_file }}"

      - name: Generate report
        run: |
          python3 .opencode/agents/report.py \
            --input results/verified.json \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            // Sanitize PR number: extract only digits
            const prRaw = '${{ steps.pr.outputs.pr_number }}';
            const prNumber = parseInt(prRaw.replace(/[^0-9]/g, ''), 10);
            
            if (!prNumber || isNaN(prNumber) || prNumber <= 0) {
              console.log('No valid PR number found, skipping comment');
              return;
            }
            
            console.log(`Posting review to PR #${prNumber}`);
            
            // Retry helper with exponential backoff
            async function withRetry(fn, maxRetries = 3, delay = 1000) {
              for (let i = 0; i < maxRetries; i++) {
                try {
                  return await fn();
                } catch (error) {
                  if (i < maxRetries - 1) {
                    const retryAfter = error.headers?.['retry-after'] || delay;
                    console.log(`Retry ${i + 1}/${maxRetries} after ${retryAfter}ms...`);
                    await new Promise(r => setTimeout(r, retryAfter));
                    delay *= 2;
                  } else {
                    throw error;
                  }
                }
              }
            }
            
            // Find existing comment
            const comments = await withRetry(() =>
              github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              })
            );
            
            const existing = comments.data.find(c => c.body.includes('Deep Code Review'));
            
            if (existing) {
              console.log(`Updating existing comment ${existing.id}`);
              await withRetry(() =>
                github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: report
                })
              );
            } else {
              console.log('Creating new comment');
              await withRetry(() =>
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: report
                })
              );
            }
            
            console.log('Review comment posted successfully');

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: report.md
          retention-days: 30
