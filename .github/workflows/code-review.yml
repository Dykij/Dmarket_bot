name: Deep Code Review (MiMo V2.5 Pro)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty to auto-detect from branch)"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Priority 1: workflow_dispatch input
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            echo "PR number from input: $PR_NUM"
          # Priority 2: pull_request event
          elif [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "PR number from event: $PR_NUM"
          # Priority 3: find open PR for current branch
          else
            BRANCH="${{ github.ref_name }}"
            echo "Looking for open PR on branch: $BRANCH"
            PR_NUM=$(gh pr list --repo "${{ github.repository }}" \
              --head "$BRANCH" --state open --json number \
              --jq '.[0].number // empty' 2>&1) || {
              echo "::warning::Failed to detect PR: $PR_NUM"
              echo "found=false" >> $GITHUB_OUTPUT
              exit 0
            }
            if [ -z "$PR_NUM" ]; then
              echo "::warning::No open PR found for branch $BRANCH. Skipping comment."
              echo "found=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "PR number from branch lookup: $PR_NUM"
          fi
          # Validate PR number is a positive integer
          if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]] || [ "$PR_NUM" -le 0 ]; then
            echo "::warning::Invalid PR number: $PR_NUM"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT

      - name: Setup Python
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip > /dev/null 2>&1
          pip3 install openai --quiet

      - name: Get diff and files
        id: context
        run: |
          # Get changed files
          FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ',')
          echo "files=$FILES" >> $GITHUB_OUTPUT

          # Save diff to file (avoids single-quote escaping issues)
          git diff origin/main...HEAD > /tmp/review_diff.txt

          # Validate diff file
          if [ ! -s /tmp/review_diff.txt ]; then
            echo "::error::Failed to generate diff or diff is empty"
            exit 1
          fi
          echo "diff_file=/tmp/review_diff.txt" >> $GITHUB_OUTPUT

          # Save stats
          STATS=$(git diff --stat origin/main...HEAD)
          echo "stats<<EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create results directory
        run: mkdir -p results

      - name: Run Agent 1 - Correctness
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent correctness \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/correctness.json

      - name: Run Agent 2 - Security
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent security \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/security.json

      - name: Run Agent 3 - Performance
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent performance \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/performance.json

      - name: Run Agent 4 - Architecture
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent architecture \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/architecture.json

      - name: Run Agent 5 - Domain
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent domain \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/domain.json

      - name: Run Agent 6 - Test Coverage
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent test_coverage \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/test_coverage.json

      - name: Run Agent 7 - Async Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent async_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/async_safety.json

      - name: Run Agent 8 - DB Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent db_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/db_safety.json

      - name: Run Agent 9 - API Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent api_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/api_safety.json

      - name: Run Agent 10 - Config Safety
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent config_safety \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/config_safety.json

      - name: Run Agent 11 - Error Recovery
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent error_recovery \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/error_recovery.json

      - name: Run Agent 12 - Duplication
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent duplication \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/duplication.json

      - name: Run Agent 13 - Kelly Sizing
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent kelly_sizing \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/kelly_sizing.json

      - name: Run Agent 14 - Fee Calculation
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent fee_calculation \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/fee_calculation.json

      - name: Run Agent 15 - Drawdown Monitor
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/run_agent.py \
            --agent drawdown_monitor \
            --files "${{ steps.context.outputs.files }}" \
            --diff-file "${{ steps.context.outputs.diff_file }}" \
            --output results/drawdown_monitor.json

      - name: Deduplication
        run: |
          python3 .opencode/agents/dedup.py \
            --input results/correctness.json results/security.json results/performance.json results/architecture.json results/domain.json results/test_coverage.json results/async_safety.json results/db_safety.json results/api_safety.json results/config_safety.json results/error_recovery.json results/duplication.json results/kelly_sizing.json results/fee_calculation.json results/drawdown_monitor.json \
            --output results/deduped.json

      - name: Verification
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
        run: |
          python3 .opencode/agents/verify.py \
            --input results/deduped.json \
            --output results/verified.json \
            --diff-file "${{ steps.context.outputs.diff_file }}"

      - name: Generate report
        run: |
          python3 .opencode/agents/report.py \
            --input results/verified.json \
            --output report.md

      - name: Generate machine-readable output
        if: always()
        run: |
          python3 -c "
          import json, sys
          try:
              with open('results/verified.json') as f:
                  data = json.load(f)
              findings = data.get('findings', [])
              important = sum(1 for f in findings if f.get('severity') == 'IMPORTANT')
              nits = sum(1 for f in findings if f.get('severity') == 'NIT')
              pre_existing = sum(1 for f in findings if f.get('severity') == 'PRE_EXISTING')
              output = {'normal': important, 'nit': nits, 'pre_existing': pre_existing}
          except Exception:
              output = {'normal': 0, 'nit': 0, 'pre_existing': 0}
          
          with open('check_run_output.json', 'w') as f:
              json.dump(output, f)
          
          print(json.dumps(output))
          "

      - name: Post inline review comments
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const prRaw = '${{ steps.pr.outputs.pr_number }}';
            const prNumber = parseInt(prRaw.replace(/[^0-9]/g, ''), 10);
            
            if (!prNumber || isNaN(prNumber) || prNumber <= 0) {
              console.log('No valid PR number, skipping');
              return;
            }
            
            // Read REVIEW.md if exists
            let reviewInstructions = '';
            try {
              reviewInstructions = fs.readFileSync('REVIEW.md', 'utf8');
            } catch (e) {
              console.log('No REVIEW.md found, using defaults');
            }
            
            // Parse findings from verified.json
            let findings = [];
            try {
              const verified = JSON.parse(fs.readFileSync('results/verified.json', 'utf8'));
              findings = verified.findings || [];
            } catch (e) {
              console.log('Failed to parse verified.json:', e.message);
            }
            
            // Filter: only Important findings with file:line
            const importantFindings = findings.filter(f => 
              f.severity === 'IMPORTANT' && 
              f.file && f.file !== 'N/A' && 
              f.line && f.line > 0
            );
            
            console.log(`Found ${importantFindings.length} inline comment candidates`);
            
            // Cap nits at 5 (from REVIEW.md convention)
            const nitFindings = findings.filter(f => f.severity === 'NIT').slice(0, 5);
            
            // Create inline comments on PR diff
            const comments = [];
            for (const finding of importantFindings) {
              comments.push({
                path: finding.file,
                line: finding.line,
                body: `🔴 **${finding.title}**\n\n${finding.description}\n\n**Trigger:** ${finding.trigger || 'N/A'}\n**Impact:** ${finding.impact || 'N/A'}\n\n**Fix:**\n\`\`\`\n${finding.fix || 'See description'}\n\`\`\``
              });
            }
            
            // Add nits as inline comments
            for (const finding of nitFindings) {
              if (finding.file && finding.file !== 'N/A' && finding.line > 0) {
                comments.push({
                  path: finding.file,
                  line: finding.line,
                  body: `🟡 **${finding.title}**\n\n${finding.description}`
                });
              }
            }
            
            // Post as PR review (not just comment)
            const summaryTally = `**${importantFindings.length} Important, ${nitFindings.length} Nits**`;
            const summary = importantFindings.length === 0 
              ? `## Deep Code Review\n\nNo blocking issues found.\n\n${summaryTally}`
              : `## Deep Code Review\n\n${summaryTally}\n\n---\n\n${report}`;
            
            try {
              await withRetry(() =>
                github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  event: 'COMMENT',
                  body: summary,
                  comments: comments.filter(c => c.path && c.line > 0).slice(0, 50) // GitHub limit
                })
              );
              console.log(`Posted review with ${comments.length} inline comments`);
            } catch (e) {
              console.log(`Failed to create review: ${e.message}`);
              // Fallback: post as comment
              await withRetry(() =>
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: summary
                })
              );
            }
            
            // Helper: retry with backoff
            async function withRetry(fn, maxRetries = 3, delay = 1000) {
              for (let i = 0; i < maxRetries; i++) {
                try {
                  return await fn();
                } catch (error) {
                  if (i < maxRetries - 1) {
                    const retryAfter = error.headers?.['retry-after'] || delay;
                    await new Promise(r => setTimeout(r, retryAfter));
                    delay *= 2;
                  } else {
                    throw error;
                  }
                }
              }
            }
            
            console.log('Review posted successfully');

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: report.md
          retention-days: 30
