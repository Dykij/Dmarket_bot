name: HFT Bot CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with Ruff
      run: |
        ruff check . --select=E9,F63,F7,F82 --target-version=py311
        ruff check . --exit-zero
    - name: Run Smoke Tests
      run: |
        # Only run the manual test script as a smoke test for now
        # to ensure environment sanity without triggering full legacy suite
        # Note: This might fail if it needs real keys, so we mock or skip if keys missing
        # For CI, just checking if it imports is good enough for step 1
        python -c "import src.utils.api_client; print('Imports OK')"
