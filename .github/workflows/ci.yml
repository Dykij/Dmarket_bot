name: CI

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install ruff pytest pytest-asyncio
        
    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check src/ --select E9,F63,F7,F82 --output-format=github
        # Default run (exit non-zero on error)
        ruff check src/ --exit-non-zero-on-fix
        
    - name: Test with pytest
      run: |
        # Run unit tests only to keep CI fast
        # Ignoring integration tests that require external services
        # If tests/unit/ doesn't exist, we skip to prevent failure on empty repo
        if [ -d "tests/unit" ]; then
          pytest tests/unit/ --ignore=tests/integration --ignore=tests/e2e
        else
          echo "No unit tests found, skipping..."
        fi
