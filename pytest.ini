[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: Quick unit tests (no DB/API)
    integration: DB/Redis/API mocks required
    e2e: Full end-to-end with fixtures
    slow: slow running tests
    asyncio: Async tests (auto-detected)
    smoke: Critical path smoke tests
    medium_risk: tests with medium financial or operational risk
    low_risk: Low-risk feature tests
    high_risk: High-risk feature tests
    critical: Critical path tests that must pass
    regression: Regression tests for bug fixes
