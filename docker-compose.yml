# ============================================================================
# DMarket Quantitative Engine — Docker Compose (v14.4)
# Single-service deployment with persistent data.
# ============================================================================
#
# Quick start:
#   1. Copy .env.example → .env and fill in your keys
#   2. docker compose up -d
#   3. docker compose logs -f
#
# Optional: Telegram control bot (separate service)
#   docker compose --profile telegram up -d
# ============================================================================

services:
  dmarket_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmarket_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ROLE=SCANNER
      - HEALTH_PORT=9091
    volumes:
      # Persistent data (SQLite databases + price history)
      - ./data:/app/data
      # Persistent logs
      - ./logs:/app/logs
    networks:
      - dmarket_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Optional: Telegram control bot for remote admin
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmarket_telegram
    restart: unless-stopped
    profiles:
      - telegram
    env_file:
      - .env
    environment:
      - ROLE=TELEGRAM
    command: ["python", "-m", "src.telegram.control_bot"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - dmarket_net
    depends_on:
      dmarket_bot:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  dmarket_net:
    driver: bridge
