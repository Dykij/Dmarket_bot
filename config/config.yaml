# Configuration for development environment
# Mock configuration for smoke test

bot:
  token: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz123456789"
  username: "dmarket_bot"
  webhook:
    url: ""
    secret: ""

dmarket:
  api_url: "https://api.dmarket.com"
  public_key: "aabbccddeeffgghhiijjkkllmmnnooppqqrrsstt"
  secret_key: "11223344556677889900aabbccddeeffgghhiijj"
  rate_limit: 30

# Waxpeer P2P Integration
waxpeer:
  enabled: false
  api_key: ""

# Scanner configuration
scanner:
  max_concurrent_scans: 2
  scan_interval_seconds: 10.0
  adaptive:
    enabled: true
    min_interval: 2.5
    max_interval: 10.0
  parallel:
    enabled: true
    max_concurrent: 2
  cleanup:
    enabled: true
    max_age_hours: 24
    interval_minutes: 60

database:
  url: "sqlite:///data/dmarket_bot.db"
  echo: false
  pool_size: 5
  max_overflow: 10

redis:
  url: "redis://localhost:6379"

logging:
  level: "INFO"
  file: "logs/dmarket_bot.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  rotation: "1 week"
  retention: "1 month"

security:
  allowed_users: []
  admin_users: []

analytics:
  enabled: true

monitoring:
  sentry_dsn: ""
  prometheus_enabled: false

cache:
  ttl: 300
  max_size: 1000

arbitrage_filters:
  enabled: true
  min_avg_price: 0.50
  good_points_percent: 80
  boost_percent: 150
  min_sales_volume: 10
  min_profit_margin: 5.0
  outlier_threshold: 2.0
  min_liquidity_score: 60
  max_time_to_sell_days: 7

market_analysis:
  enabled: true
  update_interval: 3600
  top_items_count: 100
  min_daily_volume: 50

diversification:
  enabled: true
  max_same_items_in_inventory: 5
  max_single_item_percent: 25
  min_different_items: 5
  max_stack_value_percent: 15

game_strategy:
  enabled: true
  weights:
    tf2: 30
    csgo: 40
    rust: 20
    dota2: 10

whitelist:
  enabled: true
  file_path: "data/whitelist.json"
  priority_only: false
  buy_max_overpay_percent: 2.0

auto_sell:
  enabled: true
  min_margin_percent: 4.0
  max_margin_percent: 12.0
  target_margin_percent: 8.0
  undercut_cents: 1
  price_check_interval_minutes: 30
  stop_loss_hours: 48
  stop_loss_percent: 5.0
  max_active_sales: 50
  delay_before_list_seconds: 5
  pricing_strategy: "undercut"
  dmarket_fee_percent: 7.0

repricing:
  enabled: true
  intervals:
    - hours: 24
      action: "reduce_to_target"
    - hours: 48
      action: "reduce_to_break_even"
    - hours: 72
      action: "liquidate"
  max_price_cut_percent: 15
  night_mode:
    enabled: true
    start_hour: 2
    end_hour: 6
    undercut_multiplier: 2.0

panic_protection:
  enabled: true
  threshold_percent: 15
  check_window_hours: 1
  action: "pause"

blacklist:
  enabled: true
  file_path: "data/blacklist.json"
  auto_blacklist_threshold: 3
  failure_expiry_hours: 24
  forbidden_keywords:
    - "Souvenir"
    - "Well-Worn"
    - "Inscribed Gem"
    - "StatTrak™ Music Kit"
    - "Autograph"

market_sentiment:
  enabled: true
  check_interval_minutes: 15
  panic_sell_threshold: -0.07
  high_risk_hunt: true
  speculative_budget_pct: 0.15

steam_parser:
  enabled: true
  cache_ttl: 300
  max_concurrent_requests: 10
  request_timeout: 5.0
  use_proxy: false
  proxy_url: ""
  requests_per_minute: 30
  arbitrage:
    min_profit_percent: 15
    max_discount_percent: 50

intelligent_hold:
  enabled: true
  min_expected_gain: 10
  max_hold_days: 14
  profit_take_threshold: 20
  loss_cut_days: 7
  loss_cut_threshold: 5
  event_sensitive_categories:
    - "stickers"
    - "capsules"
    - "cases"

ai_training:
  enabled: true
  real_prices:
    default_samples: 500
    games: ["csgo", "tf2", "dota2", "rust"]
    min_price_usd: 0.50
    max_price_usd: 1000.0
  liquid_training:
    enabled: true
    liquidity_threshold: 50
    min_offers_dmarket: 3
    min_offers_waxpeer: 5
    whitelist_bonus: 25
    whitelist_threshold: 40
    use_waxpeer: true
    use_steam: true
  hallucination_protection:
    enabled: true
    max_profit_percent: 40
    outlier_zscore_threshold: 3.0
  data_paths:
    market_history: "data/market_history.csv"
    liquid_items: "data/liquid_items.csv"
    model_path: "data/price_model.pkl"

money_management:
  enabled: true
  small_balance_threshold: 100
  medium_balance_threshold: 500
  large_balance_threshold: 1000
  max_item_percent:
    small: 25
    medium: 15
    large: 10
  min_item_percent: 0.5
  reserve_percent: 5
  target_roi:
    small: 15.0
    medium: 12.0
    large: 8.0
  balance_spike_threshold: 50
  balance_spike_action: "pause_and_confirm"

rate_limit:
  warning_threshold: 0.9
  enable_notifications: true
  base_retry_delay: 1.0
  max_backoff_time: 60.0
  max_retry_attempts: 5
  market_limit: 2
  trade_limit: 1
  user_limit: 5
  balance_limit: 10
  other_limit: 5
